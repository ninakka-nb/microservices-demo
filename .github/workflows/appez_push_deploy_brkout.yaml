# Look for the tags __MAKE__CHANGES__FROM__HERE__ and __MAKE__CHANGES__TO__HERE__
name: "Update and deploy breakout"
on:
  pull_request:
    # run on pull request from branch
    types:
    - opened
    - edited
    - reopened

jobs:
  create-brkout:
    if: github.head_ref == dev--ftr/freeshipping--brkout/freeship003
    runs-on: [usvcs-runner]
    steps:
    - uses: actions/checkout@v4

    - name: Build deployments
      id: build
      timeout-minutes: 20
      run: |
        # __MAKE__CHANGES__FROM__HERE__
        # place build commands here
        # Build image and push to registry for container 'server' of deployment 'shippingservice'
        # echo "IMAGE_shippingservice_server=<<shippingservice_server_image:tag>>" >> $GITHUB_OUTPUT
        # __MAKE__CHANGES__TO__HERE__

    - name: Create Breakout
      timeout-minutes: 20
      run: |
        cat <<EOF > breakout.yaml
        apiVersion: appez.rightelast.com/v1beta1
        kind: Breakout
        metadata:
          creationTimestamp: null
          name: freeship003
          namespace: appez-kb51-j582-l7cf02-m74b882c
        spec:
          application: onlineboutique
          baseBreakout: appez-dflt-brkout
          cluster: clstr0001
          environment: dev
          feature: freeshipping
          moduleRefs:
          - containers:
            - env:
              - name: NUM_ITEMS_FOR_FREE_SHIPPING
                value: "003"
              envType: Add
              image: ${{ steps.build.outputs.IMAGE_shippingservice_server }}
              livenessProbe:
                exec:
                  command:
                  - /bin/grpc_health_probe
                  - -addr=:50051
                failureThreshold: 10
                periodSeconds: 30
                successThreshold: 1
                timeoutSeconds: 30
              livenessProbeType: Replace
              name: server
              readinessProbe:
                exec:
                  command:
                  - /bin/grpc_health_probe
                  - -addr=:50051
                failureThreshold: 10
                periodSeconds: 30
                successThreshold: 1
                timeoutSeconds: 30
              readinessProbeType: Replace
              resources:
                limits:
                  cpu: 35m
                  memory: 35Mi
                requests:
                  cpu: 25m
                  memory: 25Mi
            kind: Deployment
            name: shippingservice
          - kind: Service
            name: shippingservice
          routingRules:
            httpRoute: {}
          scope: public
        status: {}
        EOF
        #
        curl -X PUT https://appez-api.rightelast.com/api/v1/breakouts -H 'Content-Type: application/x-yaml' --data-binary @breakout.yaml